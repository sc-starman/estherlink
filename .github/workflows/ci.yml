name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore solution
        run: dotnet restore OmniRelay.sln

      - name: Dependency vulnerability scan
        run: dotnet list OmniRelay.sln package --vulnerable --include-transitive

      - name: Build solution
        run: dotnet build OmniRelay.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test OmniRelay.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Validate EF migration script generation
        run: |
          mkdir -p artifacts
          dotnet tool run dotnet-ef migrations script --idempotent \
            --project src/OmniRelay.Backend/OmniRelay.Backend.csproj \
            --startup-project src/OmniRelay.Backend/OmniRelay.Backend.csproj \
            --context OmniRelay.Backend.Data.AppDbContext \
            -o artifacts/migrations.sql

      - name: Validate docker compose
        run: docker compose config

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
